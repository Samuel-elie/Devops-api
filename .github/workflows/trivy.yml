name: Trivy Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  trivy-config:
    name: Trivy Config Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}
          restore-keys: |
            trivy-${{ runner.os }}

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: ./helm/devops-api
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: trivy-config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}
          restore-keys: |
            trivy-${{ runner.os }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/samuel-elie/devops-api:1.0.0
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL