apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  # On ne fixe plus le namespace dans values.yaml.
  # On laisse Helm utiliser le namespace du release.
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-sa

      # Sécurité au niveau Pod :
      # - seccomp RuntimeDefault
      # - protection de base contre certains appels système dangereux
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}

          # Sécurité au niveau container :
          # - non-root obligatoire
          # - UID/GID explicites pour satisfaire Kubernetes + Trivy
          # - aucune capability Linux par défaut
          # - root filesystem en lecture seule
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret

          env:
            - name: MONGO_URL
              value: "mongodb://$(MONGO_USER):$(MONGO_PASSWORD)@$(MONGO_HOST):$(MONGO_PORT)/$(MONGO_DB)?authSource=$(MONGO_AUTH_SOURCE)"
            - name: OTEL_SERVICE_NAME
              value: devops-api
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://tempo.observability:4318/v1/traces

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
{{ toYaml .Values.resources | indent 12 }}