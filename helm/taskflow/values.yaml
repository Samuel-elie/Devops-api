replicaCount:
  api: 1
  web: 1

image:
  api:
    repository: ghcr.io/samuel-elie/taskflow-api
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/samuel-elie/taskflow-web
    tag: "1.0.0"
    pullPolicy: IfNotPresent

service:
  api:
    type: ClusterIP
    port: 3001
  web:
    type: ClusterIP
    port: 3000

ingress:
  enabled: true
  className: public
  clusterIssuer: selfsigned-issuer
  hosts:
    web: taskflow.local
    api: api.taskflow.local

config:
  api:
    NODE_ENV: production
    PORT: "3001"
    FRONTEND_URL: https://taskflow.local
    JWT_ACCESS_EXPIRES_IN: "15m"
    JWT_REFRESH_EXPIRES_IN: "7d"    
  web:
    NODE_ENV: production
    PORT: "3000"
    NEXT_PUBLIC_API_URL: https://api.taskflow.local

secret:
  create: false
  api:
    DATABASE_URL: "replace-me"
    JWT_ACCESS_SECRET: "replace-me"
    JWT_REFRESH_SECRET: "replace-me"
    
resources:
  api:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  web:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"