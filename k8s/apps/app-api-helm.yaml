apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-api-helm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Samuel-elie/Devops-api.git
    targetRevision: main
    path: helm/devops-api
    helm:
      releaseName: devops-api
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-helm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true