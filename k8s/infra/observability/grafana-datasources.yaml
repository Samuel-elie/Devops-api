apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-extra-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://kube-prom-stack-kube-prome-prometheus.observability:9090
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.observability:3100

      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.observability:3100