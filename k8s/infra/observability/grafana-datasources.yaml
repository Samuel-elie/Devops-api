apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-taskflow
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  taskflow-datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prom-stack-kube-prome-prometheus.observability:9090
        isDefault: true
        editable: true

      - name: loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.observability:3100
        editable: true

      - name: tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observability:3200
        editable: true